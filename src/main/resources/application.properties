spring.application.name=lkclothing_backend
# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/lkclothing_db?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA Settings
# This tells Spring Boot to automatically create the database tables based on our Java code!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect